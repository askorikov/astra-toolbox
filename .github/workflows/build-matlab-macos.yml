name: Build MATLAB distribution for macOS

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-matlab-distribution:
    name: Build MATLAB distribution
    runs-on: macos-latest

    env:
      ASTRA_PREFIX: ${{ github.workspace }}/astra-dist

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install autoconf automake libtool

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Discover MATLAB installation
        run: |
          MATLAB_BIN="$(perl -MCwd=abs_path -e 'print abs_path(shift)' "$(command -v matlab)")"
          MATLAB_ROOT="$(cd "$(dirname "$MATLAB_BIN")/.." && pwd -P)"
          echo "MATLAB_ROOT=$MATLAB_ROOT" >> "$GITHUB_ENV"
          echo "Using MATLAB at $MATLAB_ROOT"

      - name: Build and install MATLAB distribution
        working-directory: build/linux
        run: |
          ./autogen.sh
          ./configure \
            --with-matlab="$MATLAB_ROOT" \
            --prefix="$ASTRA_PREFIX" \
            --with-install-type=module
          make -j"$(sysctl -n hw.ncpu)"
          make install

      - name: Upload MATLAB distribution
        uses: actions/upload-artifact@v4
        with:
          name: astra-matlab-${{ runner.os }}-${{ runner.arch }}
          path: ${{ env.ASTRA_PREFIX }}
          if-no-files-found: error
